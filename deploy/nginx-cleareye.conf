# nginx reverse proxy for ClearEye
# Managed by: deploy/deploy.sh
# Certbot manages the ssl_certificate / ssl_certificate_key lines below.
#
# Rate-limit zone: 10 r/s per IP, burst of 20, shared 10 MB memory.
limit_req_zone $binary_remote_addr zone=cleareye_api:10m rate=10r/s;

# -- HTTP -> HTTPS redirect ----------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name enviro-sensors.uk www.enviro-sensors.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -- HTTPS ---------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name enviro-sensors.uk www.enviro-sensors.uk;

    # Certbot populates these two lines automatically.
    ssl_certificate     /etc/letsencrypt/live/enviro-sensors.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enviro-sensors.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # -- Security headers ------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

    # Hide upstream version info
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # -- ClearEye API at /cleareye/ --------------------------------------------
    location /cleareye/ {
        # Rate limiting: burst of 20 requests, no delay for first 10
        limit_req zone=cleareye_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8002/cleareye/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;

        # Docs — allow in dev, restrict in prod by adding:
        # allow 127.0.0.1; deny all;
        location ~ ^/cleareye/(docs|redoc|openapi\.json) {
            proxy_pass http://127.0.0.1:8002$request_uri;
        }
    }

    # Block common scanners/bots
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
}
